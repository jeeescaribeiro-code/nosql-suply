<svg width="960" height="720" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Modelagem NoSQL por agregados</title>
  <desc id="desc">Diagrama dos agregados NoSQL do sistema de rastreamento de cadeia de suprimentos.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="2" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 20px Arial, sans-serif; fill: #000000; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 1.4; filter: url(#shadow); }
      .head { fill: #f7f7f7; stroke: #111111; stroke-width: 1.2; }
      .name { font: 700 13px Arial, sans-serif; fill: #000000; }
      .attr { font: 400 11px Arial, sans-serif; fill: #000000; }
      .label { font: 400 10px Arial, sans-serif; fill: #000000; }
      .card { font: 400 10px Arial, sans-serif; fill: #000000; }
      .line { stroke: #111111; stroke-width: 1.25; fill: none; }
      .diamond { fill: #000000; stroke: #000000; stroke-width: 1; }
    </style>
  </defs>

  <rect width="960" height="720" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" class="title">Modelagem NoSQL - Agregados do Sistema</text>

  <!-- Agregados principais -->
  <rect x="70" y="78" width="170" height="96" class="box"/>
  <rect x="70" y="78" width="170" height="28" class="head"/>
  <text x="155" y="97" text-anchor="middle" class="name">LOTE</text>
  <line x1="70" y1="106" x2="240" y2="106" class="line"/>
  <text x="86" y="128" class="attr">codigo</text>
  <text x="86" y="144" class="attr">quantidade prevista</text>
  <text x="86" y="160" class="attr">status geral</text>
  <polygon points="155,174 163,184 155,194 147,184" class="diamond"/>

  <rect x="385" y="78" width="180" height="96" class="box"/>
  <rect x="385" y="78" width="180" height="28" class="head"/>
  <text x="475" y="97" text-anchor="middle" class="name">PRODUTO</text>
  <line x1="385" y1="106" x2="565" y2="106" class="line"/>
  <text x="401" y="128" class="attr">codigo</text>
  <text x="401" y="144" class="attr">nome</text>
  <text x="401" y="160" class="attr">status atual</text>
  <polygon points="475,174 483,184 475,194 467,184" class="diamond"/>

  <rect x="715" y="78" width="180" height="112" class="box"/>
  <rect x="715" y="78" width="180" height="28" class="head"/>
  <text x="805" y="97" text-anchor="middle" class="name">USUARIO</text>
  <line x1="715" y1="106" x2="895" y2="106" class="line"/>
  <text x="731" y="128" class="attr">email</text>
  <text x="731" y="144" class="attr">nome</text>
  <text x="731" y="160" class="attr">perfil de acesso</text>
  <text x="731" y="176" class="attr">colecao auxiliar</text>

  <!-- Dados do lote -->
  <rect x="28" y="270" width="160" height="84" class="box"/>
  <rect x="28" y="270" width="160" height="28" class="head"/>
  <text x="108" y="289" text-anchor="middle" class="name">Nota Fiscal</text>
  <line x1="28" y1="298" x2="188" y2="298" class="line"/>
  <text x="44" y="320" class="attr">numero</text>
  <text x="44" y="336" class="attr">emissor</text>

  <rect x="210" y="270" width="170" height="84" class="box"/>
  <rect x="210" y="270" width="170" height="28" class="head"/>
  <text x="295" y="289" text-anchor="middle" class="name">Resumo do Lote</text>
  <line x1="210" y1="298" x2="380" y2="298" class="line"/>
  <text x="226" y="320" class="attr">origem</text>
  <text x="226" y="336" class="attr">destino previsto</text>

  <!-- Dados do produto -->
  <rect x="425" y="270" width="170" height="84" class="box"/>
  <rect x="425" y="270" width="170" height="28" class="head"/>
  <text x="510" y="289" text-anchor="middle" class="name">Localizacao Atual</text>
  <line x1="425" y1="298" x2="595" y2="298" class="line"/>
  <text x="441" y="320" class="attr">local</text>
  <text x="441" y="336" class="attr">cidade</text>

  <rect x="625" y="270" width="180" height="84" class="box"/>
  <rect x="625" y="270" width="180" height="28" class="head"/>
  <text x="715" y="289" text-anchor="middle" class="name">Alertas Ativos</text>
  <line x1="625" y1="298" x2="805" y2="298" class="line"/>
  <text x="641" y="320" class="attr">tipo</text>
  <text x="641" y="336" class="attr">status</text>

  <!-- Eventos e alertas -->
  <rect x="330" y="410" width="230" height="100" class="box"/>
  <rect x="330" y="410" width="230" height="28" class="head"/>
  <text x="445" y="429" text-anchor="middle" class="name">MOVIMENTACAO</text>
  <line x1="330" y1="438" x2="560" y2="438" class="line"/>
  <text x="346" y="460" class="attr">tipo</text>
  <text x="346" y="476" class="attr">data e hora</text>
  <text x="346" y="492" class="attr">resultado da verificacao</text>
  <polygon points="445,510 453,520 445,530 437,520" class="diamond"/>

  <rect x="695" y="410" width="190" height="100" class="box"/>
  <rect x="695" y="410" width="190" height="28" class="head"/>
  <text x="790" y="429" text-anchor="middle" class="name">ALERTA</text>
  <line x1="695" y1="438" x2="885" y2="438" class="line"/>
  <text x="711" y="460" class="attr">tipo</text>
  <text x="711" y="476" class="attr">gravidade</text>
  <text x="711" y="492" class="attr">status da investigacao</text>
  <polygon points="790,510 798,520 790,530 782,520" class="diamond"/>

  <!-- Dados internos de eventos e alertas -->
  <rect x="238" y="590" width="160" height="84" class="box"/>
  <rect x="238" y="590" width="160" height="28" class="head"/>
  <text x="318" y="609" text-anchor="middle" class="name">Origem</text>
  <line x1="238" y1="618" x2="398" y2="618" class="line"/>
  <text x="254" y="640" class="attr">local</text>
  <text x="254" y="656" class="attr">usuario</text>

  <rect x="430" y="590" width="170" height="84" class="box"/>
  <rect x="430" y="590" width="170" height="28" class="head"/>
  <text x="515" y="609" text-anchor="middle" class="name">Destino</text>
  <line x1="430" y1="618" x2="600" y2="618" class="line"/>
  <text x="446" y="640" class="attr">local</text>
  <text x="446" y="656" class="attr">quantidade confirmada</text>

  <rect x="700" y="590" width="170" height="84" class="box"/>
  <rect x="700" y="590" width="170" height="28" class="head"/>
  <text x="785" y="609" text-anchor="middle" class="name">Auditoria</text>
  <line x1="700" y1="618" x2="870" y2="618" class="line"/>
  <text x="716" y="640" class="attr">responsavel</text>
  <text x="716" y="656" class="attr">parecer</text>

  <!-- Composicoes de LOTE -->
  <path d="M155 194 L155 230 L108 230 L108 270" class="line"/>
  <path d="M155 194 L155 230 L295 230 L295 270" class="line"/>

  <!-- LOTE agrupa PRODUTO -->
  <path d="M240 126 L385 126" class="line"/>
  <text x="286" y="118" class="label">agrupa</text>
  <text x="247" y="142" class="card">1</text>
  <text x="368" y="142" class="card">1..n</text>

  <!-- Composicoes de PRODUTO -->
  <path d="M475 194 L475 230 L510 230 L510 270" class="line"/>
  <path d="M475 194 L475 230 L715 230 L715 270" class="line"/>

  <!-- PRODUTO possui MOVIMENTACAO: rota contorna os dados internos -->
  <path d="M475 194 L475 220 L615 220 L615 372 L445 372 L445 410" class="line"/>
  <text x="470" y="387" class="label">possui historico</text>
  <text x="457" y="404" class="card">0..n</text>

  <!-- USUARIO e referenciado por eventos e alertas, mas nao fica embutido neles -->
  <path d="M895 148 L925 148 L925 382 L500 382 L500 410" class="line"/>
  <path d="M790 382 L790 410" class="line"/>
  <text x="570" y="374" class="label">movimentacao.usuario</text>
  <text x="795" y="374" class="label">alerta.responsavel</text>

  <!-- MOVIMENTACAO pode gerar ALERTA -->
  <path d="M560 460 L695 460" class="line"/>
  <text x="596" y="452" class="label">pode gerar</text>
  <text x="568" y="476" class="card">1</text>
  <text x="678" y="476" class="card">0..n</text>

  <!-- Composicoes de MOVIMENTACAO -->
  <path d="M445 530 L445 560 L318 560 L318 590" class="line"/>
  <path d="M445 530 L445 560 L515 560 L515 590" class="line"/>

  <!-- Composicao de ALERTA -->
  <path d="M790 530 L790 560 L785 560 L785 590" class="line"/>

</svg>
